<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghumo Duniya | UI/UX Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, #3b82f6 0%, #000000 100%);
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white selection:bg-blue-500">

    <nav class="fixed top-0 w-full z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass rounded-2xl px-6 py-3">
            <h1 class="text-xl font-bold tracking-tighter">GHUMO_DUNIYA</h1>
            <div class="hidden md:flex gap-8 text-sm font-medium text-gray-400">
                <a href="#work" class="hover:text-white transition">Work</a>
                <a href="#about" class="hover:text-white transition">About</a>
                <a href="#contact" class="hover:text-white transition">Contact</a>
            </div>
            <button class="bg-white text-black px-5 py-2 rounded-full text-sm font-bold hover:bg-blue-500 hover:text-white transition">
                Hire Me
            </button>
        </div>
    </nav>

    <section class="h-screen flex flex-col justify-center items-center text-center px-4">
        <div class="absolute inset-0 hero-gradient opacity-20 -z-10"></div>
        <span class="text-blue-500 font-mono mb-4 block">Available for freelance</span>
        <h1 class="text-6xl md:text-8xl font-bold tracking-tight mb-6">
            Designing the <br> <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Future of Travel.</span>
        </h1>
        <p class="text-gray-400 max-w-xl text-lg mb-8">
            I'm a UI/UX Designer specializing in immersive digital experiences for the modern world.
        </p>
        <div class="flex gap-4">
            <i data-lucide="arrow-down" class="animate-bounce text-gray-500"></i>
        </div>
    </section>

    <section id="work" class="max-w-7xl mx-auto px-6 py-24">
        <h2 class="text-3xl font-bold mb-12">Selected Projects</h2>
        <div class="grid md:grid-cols-2 gap-8">
            <div class="group cursor-pointer">
                <div class="aspect-video bg-neutral-900 rounded-3xl overflow-hidden mb-4 border border-neutral-800">
                    <div class="w-full h-full bg-gradient-to-br from-blue-600 to-purple-700 opacity-50 group-hover:scale-105 transition duration-500"></div>
                </div>
                <h3 class="text-xl font-bold">Ghumo Duniya Mobile App</h3>
                <p class="text-gray-500">Travel & Booking UX</p>
            </div>
            <div class="group cursor-pointer">
                <div class="aspect-video bg-neutral-900 rounded-3xl overflow-hidden mb-4 border border-neutral-800">
                    <div class="w-full h-full bg-gradient-to-br from-emerald-500 to-teal-700 opacity-50 group-hover:scale-105 transition duration-500"></div>
                </div>
                <h3 class="text-xl font-bold">Neo-Bank Dashboard</h3>
                <p class="text-gray-500">Fintech UI Design</p>
            </div>
        </div>
    </section>

    <script>
        // Initialize Icons
        lucide.createIcons();
    </script>
</body>
</html>
